<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ini's Blogs</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <header>
        <h1>Ini's Blogs</h1>
        <p class="subtitle">Thoughts, stories and ideas</p>
    </header>

    <button id="addPostButton">Write a blog</button>
    <input type="text" id="searchInput" placeholder="Search blogs..." />
    <div id="searchResults" style="display:none;"></div>

    <div id="postList"></div>

    <div id="postView" style="display:none;">
        <button id="backButton">Back to blogs</button>
        <h2 id="postTitle"></h2>
        <p id="postMeta"></p>
        <p id="postBody"></p>
        <hr />

        <h3>More blogs</h3>
        <div id="relatedPosts"></div>
    </div>

    <div id="addPostView" style="display:none">
        <button id="cancelAddButton">Back to blogs</button>

        <h2>Write a blog</h2>

        <label for="titleInput">Title</label>
        <input type="text" id="titleInput" />

        <label for="authorInput">Author</label>
        <input type="text" id="authorInput" />

        <label for="bodyInput">Body</label>
        <textarea id="bodyInput" rows="8"></textarea>

        <button id="submitPostButton">Publish blog</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
