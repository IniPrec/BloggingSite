<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inium Blogs</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
    <h1>Inium Blogs</h1>
    <h2>Welcome to Inium blogs</h2> <!-- TO DO: there should be a user account, but we'll leave that for now -->

    <button id="addPostButton">Add a New Blog</button>

    <div id="postList"></div>

    <div id="postView" style="display:none;">
        <button id="backButton">Back to all posts</button>
        <h2 id="postTitle"></h2>
        <p id="postMeta"></p> <!-- metadata about the post. Holds the date and the author -->
        <p id="postBody"></p>
    </div>

    <div id="addPostView" style="display:none;">
        <button id="cancelAddButton">Back to all posts</button><br />

        <h2>Add a new Blog</h2>

        <label for="titleInput">Title</label> <br />
        <input type="text" id="titleInput" /> <br /><br />

        <label for="authorInput">Author</label> <br />
        <input type="text" id="authorInput" /> <br /><br />

        <label for="bodyInput">Body</label> <br />
        <textarea id="bodyInput" rows="6" cols="40"></textarea> <br /><br />

        <button id="submitPostButton">Publish Blog</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
